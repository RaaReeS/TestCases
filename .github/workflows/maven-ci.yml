name: Maven CI

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:
  test:

    runs-on: ubuntu-latest

    steps:

      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Ejecutar pruebas Maven
        run: mvn clean test

      - name: Ejecutar pruebas Maven
        run: mvn clean test

      - name: Ejecutar verify
        run: mvn verify